syntax = "proto3";

package kuren.commerce;

import "google/api/annotations.proto";
import "kuren/authz/authz.proto";

option go_package = "github.com/rychmc/kuren/backend/gen/kuren/commerce";

// CommerceService provides merchant-facing operations for products, payment requests, payouts, refunds, and subscriptions.
// Authenticated via an OAuth client linked to a merchant account; the merchant must have status "active".
service CommerceService {
  // Create a new product with pricing, billing, and vesting configuration.
  rpc CreateProduct(CreateProductRequest) returns (Product) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {
      post: "/v1/commerce/products"
      body: "*"
    };
  }
  // Update mutable fields of an existing product owned by this merchant.
  // Billing type, billing interval, and vesting type cannot be changed after creation.
  rpc UpdateProduct(UpdateProductRequest) returns (Product) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {
      patch: "/v1/commerce/products/{product_id}"
      body: "*"
    };
  }
  // Retrieve a product by ID, scoped to the authenticated merchant.
  rpc GetProduct(GetProductRequest) returns (Product) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/commerce/products/{product_id}"};
  }
  // List products owned by this merchant, with optional inactive filter and cursor pagination.
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/commerce/products"};
  }

  // Search products owned by the authenticated merchant using full-text search.
  rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["commerce:read"]
    };
    option (google.api.http) = {get: "/v1/commerce/products/search"};
  }

  // Create a payment request targeting an agent, optionally linked to a product.
  // Supports two modes: direct (caller is the merchant) and platform-facilitated
  // (caller is a platform with a delegation from the merchant, specified via merchant_handle).
  // Sends a notification to the target agent. Duplicate idempotency keys return ALREADY_EXISTS.
  rpc CreatePaymentRequest(CreatePaymentRequestRequest) returns (PaymentRequest) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {
      post: "/v1/commerce/payment-requests"
      body: "*"
    };
  }
  // Retrieve a payment request by ID, scoped to the authenticated merchant.
  rpc GetPaymentRequest(GetPaymentRequestRequest) returns (PaymentRequest) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/commerce/payment-requests/{request_id}"};
  }
  // List payment requests created by this merchant, with optional status filter and cursor pagination.
  rpc ListPaymentRequests(ListPaymentRequestsRequest) returns (ListPaymentRequestsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/commerce/payment-requests"};
  }

  // Return the merchant's pending (vesting) and available (withdrawable) balances.
  rpc GetMerchantBalance(GetMerchantBalanceRequest) returns (MerchantBalance) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/commerce/balance"};
  }
  // Initiate a withdrawal from the merchant's available balance to an external Solana address.
  // Deducts from available_balance immediately; the on-chain transfer executes asynchronously.
  // On transfer failure the balance is restored and the payout is marked "failed".
  rpc CreatePayout(CreatePayoutRequest) returns (Payout) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {
      post: "/v1/commerce/payouts"
      body: "*"
    };
  }
  // List payouts for this merchant, with optional status filter and cursor pagination.
  rpc ListPayouts(ListPayoutsRequest) returns (ListPayoutsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/commerce/payouts"};
  }

  // Issue a refund against a subscription's active escrow, transferring funds from the
  // merchant's available balance back to the agent's wallet. Updates the escrow's refunded_amount.
  rpc CreateRefund(CreateRefundRequest) returns (Refund) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {
      post: "/v1/commerce/refunds"
      body: "*"
    };
  }

  // List subscriptions for this merchant, with optional status and product filters.
  rpc ListMerchantSubscriptions(ListMerchantSubscriptionsRequest) returns (ListSubscriptionsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/commerce/subscriptions"};
  }
  // Retrieve a subscription by ID, scoped to the authenticated merchant.
  rpc GetSubscription(GetSubscriptionRequest) returns (Subscription) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/commerce/subscriptions/{subscription_id}"};
  }
}

// AgentCommerceService provides agent-facing operations for reviewing payment requests, managing subscriptions, and viewing purchase history.
// Authenticated as an agent via JWT.
service AgentCommerceService {
  // Return all pending, non-expired payment requests addressed to the authenticated agent.
  rpc GetPendingPaymentRequests(GetPendingPaymentRequestsRequest) returns (PendingPaymentRequestsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["commerce:read"]
    };
    option (google.api.http) = {get: "/v1/me/payment-requests"};
  }
  // Approve a pending payment request: verify the agent's wallet balance, transfer funds to
  // the merchant (split via platform if applicable), create an escrow entry, and optionally
  // create a subscription for recurring products. Returns the updated request, the new wallet
  // balance, and the subscription if one was created.
  rpc ApprovePaymentRequest(ApprovePaymentRequestRequest) returns (ApprovePaymentRequestResponse) {
    option (kuren.authz.authz) = {
      scopes: ["commerce:write"]
    };
    option (google.api.http) = {
      post: "/v1/me/payment-requests/{request_id}/approve"
      body: "*"
    };
  }
  // Deny a pending payment request, marking it as "denied". Only the target agent can deny.
  rpc DenyPaymentRequest(DenyPaymentRequestRequest) returns (DenyPaymentRequestResponse) {
    option (kuren.authz.authz) = {
      scopes: ["commerce:write"]
    };
    option (google.api.http) = {
      post: "/v1/me/payment-requests/{request_id}/deny"
      body: "*"
    };
  }

  // List the authenticated agent's subscriptions, with optional status filter and cursor pagination.
  rpc ListMySubscriptions(ListMySubscriptionsRequest) returns (ListSubscriptionsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["commerce:read"]
    };
    option (google.api.http) = {get: "/v1/me/subscriptions"};
  }
  // Retrieve a subscription by ID, scoped to the authenticated agent.
  rpc GetMySubscription(GetMySubscriptionRequest) returns (Subscription) {
    option (kuren.authz.authz) = {
      scopes: ["commerce:read"]
    };
    option (google.api.http) = {get: "/v1/me/subscriptions/{subscription_id}"};
  }
  // Cancel a subscription. If immediate=true, cancels now and refunds the unvested escrow
  // balance to the agent's wallet. If immediate=false, sets cancel_at_period_end and the
  // subscription terminates when the current period expires (no refund).
  rpc CancelMySubscription(CancelMySubscriptionRequest) returns (CancelSubscriptionResponse) {
    option (kuren.authz.authz) = {
      scopes: ["commerce:write"]
    };
    option (google.api.http) = {
      post: "/v1/me/subscriptions/{subscription_id}/cancel"
      body: "*"
    };
  }

  // List the authenticated agent's purchase history (currently subscription starts only).
  rpc ListPurchaseHistory(ListPurchaseHistoryRequest) returns (ListPurchaseHistoryResponse) {
    option (kuren.authz.authz) = {
      scopes: ["commerce:read"]
    };
    option (google.api.http) = {get: "/v1/me/purchases"};
  }
}

// ============================================================================
// Product Messages
// ============================================================================

message Product {
  string id = 1;
  string merchant_id = 2;
  string name = 3;
  string description = 4;
  int64 price_usdc = 5; // Micro-units (6 decimals), e.g., 1000000 = 1 USDC
  string billing_type = 6; // "one_time" | "recurring"
  string billing_interval = 7; // "daily" | "weekly" | "monthly" (empty for one_time)
  // Controls when escrowed payment funds become available (withdrawable) to the merchant.
  //   "immediate"     -- funds move to available_balance as soon as the agent pays
  //   "daily_prorate" -- funds vest linearly over the billing period
  //   "completion"    -- funds remain pending until explicitly released by the merchant
  string vesting_type = 8;
  int32 trial_days = 9; // Number of free trial days before first billing (0 = no trial)
  bool is_active = 10;
  string created_at = 11; // RFC3339
  string updated_at = 12; // RFC3339
  repeated string tags = 13;
  string logo_url = 14;
  string external_url = 15;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  int64 price_usdc = 3; // Micro-units (6 decimals); must be positive
  string billing_type = 4; // "one_time" | "recurring"
  string billing_interval = 5; // "daily" | "weekly" | "monthly" (required if recurring)
  string vesting_type = 6; // "immediate" | "daily_prorate" | "completion" (default: "immediate")
  int32 trial_days = 7; // default: 0
  repeated string tags = 8;
  string logo_url = 9;
  string external_url = 10;
}

message UpdateStringArray {
  repeated string values = 1;
}

message UpdateProductRequest {
  string product_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional int64 price_usdc = 4; // Must be positive if set
  optional bool is_active = 5;
  optional int32 trial_days = 6;
  optional UpdateStringArray tags = 7;
  optional string logo_url = 8;
  optional string external_url = 9;
}

message GetProductRequest {
  string product_id = 1;
}

message ListProductsRequest {
  bool include_inactive = 1; // When false (default), only active products are returned
  int32 limit = 2; // Default 20, max 100
  string cursor = 3; // Product ID from a previous next_cursor
}

message ListProductsResponse {
  repeated Product products = 1;
  string next_cursor = 2; // Empty when there are no more results
}

message SearchProductsRequest {
  string query = 1;              // Full-text search query (required)
  string billing_type = 2;       // Filter: "one_time" or "recurring" (empty = all)
  optional bool is_active = 3;   // Filter: active/inactive (nil = all)
  optional int64 min_price = 4;  // Filter: minimum price in micro-units
  optional int64 max_price = 5;  // Filter: maximum price in micro-units
  repeated string tags = 6;      // Filter: must have ALL of these tags
  int32 limit = 7;               // Default 20, max 100
  string cursor = 8;             // Product ID cursor
}

message SearchProductsResponse {
  repeated Product products = 1;
  string next_cursor = 2;
}

// ============================================================================
// Payment Request Messages
// ============================================================================

message PaymentRequest {
  string id = 1;
  string merchant_id = 2;
  string merchant_name = 3;
  string agent_id = 4;
  string agent_handle = 5;
  string product_id = 6; // Empty if not linked to a product
  string product_name = 7;
  int64 usdc_amount = 8; // Micro-units (6 decimals)
  string status = 9; // "pending" | "approved" | "denied" | "expired"
  string expires_at = 10; // RFC3339
  string created_at = 11; // RFC3339
  bool is_subscription = 12; // True when the linked product has billing_type "recurring"
  string billing_interval = 13; // Set when is_subscription is true
  // Platform fields -- populated only for platform-facilitated (four-party) requests.
  string platform_client_id = 14; // OAuth client ID of the facilitating platform
  string platform_name = 15;
  int64 platform_fee = 16; // Platform's cut, micro-units (6 decimals)
}

message CreatePaymentRequestRequest {
  string agent_handle = 1; // Target agent's handle (required)
  // Link to a product to inherit its price, billing type, and vesting settings.
  // If omitted, usdc_amount is required and the request is treated as a simple one-time charge.
  string product_id = 2;
  int64 usdc_amount = 3; // Overrides the product price when set; required if product_id is empty
  string idempotency_key = 4; // Prevents duplicate requests; returns ALREADY_EXISTS on conflict
  int32 expires_in_minutes = 5; // Default: 60
  // For platform-facilitated requests: the merchant handle to act on behalf of.
  // The caller must hold an active delegation from this merchant. When set, the
  // platform's fee_bps is applied to calculate the platform_fee.
  string merchant_handle = 6;
}

message GetPaymentRequestRequest {
  string request_id = 1;
}

message ListPaymentRequestsRequest {
  string status = 1; // Filter by status (empty for all)
  int32 limit = 2; // Default 20, max 100
  string cursor = 3; // Payment request ID from a previous next_cursor
}

message ListPaymentRequestsResponse {
  repeated PaymentRequest payment_requests = 1;
  string next_cursor = 2;
}

// ============================================================================
// Agent Payment Request Messages
// ============================================================================

message GetPendingPaymentRequestsRequest {
  // Empty -- uses the JWT to identify the agent.
}

message PendingPaymentRequestsResponse {
  repeated PaymentRequest payment_requests = 1;
}

message ApprovePaymentRequestRequest {
  string request_id = 1;
}

message ApprovePaymentRequestResponse {
  PaymentRequest payment_request = 1;
  Subscription subscription = 2; // Set only when the approved product is recurring
  int64 new_balance = 3; // Agent's wallet balance after payment, micro-units (6 decimals)
}

message DenyPaymentRequestRequest {
  string request_id = 1;
}

message DenyPaymentRequestResponse {
  PaymentRequest payment_request = 1;
}

// ============================================================================
// Subscription Messages
// ============================================================================

message Subscription {
  string id = 1;
  string agent_id = 2;
  string agent_handle = 3;
  string merchant_id = 4;
  string merchant_name = 5;
  string product_id = 6;
  string product_name = 7;
  int64 price_usdc = 8; // Locked price at subscription creation, micro-units (6 decimals)
  string status = 9; // "trialing" | "active" | "past_due" | "canceled"
  string current_period_start = 10; // RFC3339
  string current_period_end = 11; // RFC3339
  string trial_end = 12; // RFC3339 (empty if no trial)
  string next_billing_at = 13; // RFC3339 (empty if canceled)
  bool cancel_at_period_end = 14; // True when a graceful cancellation has been requested
  string canceled_at = 15; // RFC3339 (empty if not canceled)
  string created_at = 16; // RFC3339
}

message ListMerchantSubscriptionsRequest {
  string status = 1; // Filter by status (empty for all)
  string product_id = 2; // Filter by product (empty for all)
  int32 limit = 3; // Default 20, max 100
  string cursor = 4;
}

message ListMySubscriptionsRequest {
  string status = 1; // Filter by status (empty for all)
  int32 limit = 2; // Default 20, max 100
  string cursor = 3;
}

message ListSubscriptionsResponse {
  repeated Subscription subscriptions = 1;
  string next_cursor = 2;
}

message GetSubscriptionRequest {
  string subscription_id = 1;
}

message GetMySubscriptionRequest {
  string subscription_id = 1;
}

message CancelMySubscriptionRequest {
  string subscription_id = 1;
  // If true, cancel immediately and refund the unvested escrow balance to the agent.
  // If false, set cancel_at_period_end; the subscription stays active until the
  // current period expires, then is canceled with no refund.
  bool immediate = 2;
}

message CancelSubscriptionResponse {
  Subscription subscription = 1;
  int64 refund_amount = 2; // Micro-units refunded (0 when cancel_at_period_end)
}

// ============================================================================
// Balance & Payout Messages
// ============================================================================

message GetMerchantBalanceRequest {
  // Empty -- uses the OAuth client identity to look up the merchant.
}

// MerchantBalance represents the merchant's ledger state.
// Funds flow: agent payment -> pending_balance (vesting) -> available_balance (withdrawable).
message MerchantBalance {
  int64 pending_balance = 1; // Micro-units; escrowed funds still vesting, not yet withdrawable
  int64 available_balance = 2; // Micro-units; fully vested, can be withdrawn via CreatePayout
  int64 total_balance = 3; // pending + available
}

message CreatePayoutRequest {
  int64 amount_usdc = 1; // Micro-units (6 decimals); must be positive and <= available_balance
  string destination_address = 2; // Solana address to receive the USDC transfer
}

message Payout {
  string id = 1;
  string merchant_id = 2;
  int64 amount_usdc = 3; // Micro-units (6 decimals)
  string destination_address = 4;
  string status = 5; // "pending" | "processing" | "completed" | "failed"
  string solana_tx_sig = 6; // Solana transaction signature, set when completed
  string created_at = 7; // RFC3339
  string completed_at = 8; // RFC3339 (empty until completed)
}

message ListPayoutsRequest {
  string status = 1; // Filter by status (empty for all)
  int32 limit = 2; // Default 20, max 100
  string cursor = 3;
}

message ListPayoutsResponse {
  repeated Payout payouts = 1;
  string next_cursor = 2;
}

// ============================================================================
// Refund Messages
// ============================================================================

message CreateRefundRequest {
  string subscription_id = 1; // The subscription whose active escrow will be refunded
  int64 amount_usdc = 2; // Micro-units; must be positive and <= merchant's available_balance
  string reason = 3;
}

message Refund {
  string id = 1;
  string merchant_id = 2;
  string agent_id = 3;
  string agent_handle = 4;
  string subscription_id = 5;
  int64 amount_usdc = 6; // Micro-units (6 decimals)
  string reason = 7;
  string status = 8; // "pending" | "succeeded" | "failed"
  string created_at = 9; // RFC3339
}

// ============================================================================
// Purchase History Messages
// ============================================================================

message ListPurchaseHistoryRequest {
  int32 limit = 1; // Default 20, max 100
  string cursor = 2;
}

message PurchaseHistoryEntry {
  string id = 1;
  string merchant_name = 2;
  string product_name = 3;
  int64 usdc_amount = 4; // Micro-units (6 decimals)
  string type = 5; // "one_time" | "subscription_start" | "subscription_renewal" | "refund"
  string created_at = 6; // RFC3339
}

message ListPurchaseHistoryResponse {
  repeated PurchaseHistoryEntry entries = 1;
  string next_cursor = 2;
}
