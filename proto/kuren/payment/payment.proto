syntax = "proto3";

package kuren.payment;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "kuren/authz/authz.proto";

option go_package = "github.com/rychmc/kuren/backend/gen/kuren/payment";

// PaymentService provides agent-to-agent USDC transfers, P2P payment requests,
// on-ramp/off-ramp, and settlement confirmations for Kuren IOU transactions.
service PaymentService {
  // Return the USDC balance for the caller's wallet, optionally including the
  // CDP deposit address when the caller also holds the payments:onramp scope.
  rpc GetBalance(GetBalanceRequest) returns (BalanceResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/payments/balance"};
  }

  // Transfer USDC from the caller's wallet to another agent's wallet on the
  // same provider. Requires a "spend" wallet permission. The recipient must
  // exist and have a wallet on the same provider; private-profile recipients
  // require an existing connection. Sends a real-time notification to the
  // recipient. CDP transfers start as "pending" (confirmed on-chain later);
  // Kuren transfers are immediately "confirmed" with settlement_status
  // "unsettled".
  rpc SendPayment(SendPaymentRequest) returns (SendPaymentResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:send"]
    };
    option (google.api.http) = {
      post: "/v1/payments/send"
      body: "*"
    };
  }

  // List the caller's transaction history across all wallets, or for a specific
  // wallet. Supports cursor-based pagination. The solana_tx_sig field is only
  // populated when the caller holds the payments:onramp scope.
  rpc GetTransactions(GetTransactionsRequest) returns (GetTransactionsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:history"]
    };
    option (google.api.http) = {get: "/v1/payments/transactions"};
  }

  // Return the Solana Associated Token Account (ATA) address for depositing
  // USDC into a CDP wallet. Fails for Kuren wallets.
  rpc GetDepositAddress(GetDepositAddressRequest) returns (DepositAddressResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:onramp"]
    };
    option (google.api.http) = {get: "/v1/payments/deposit-address"};
  }

  // Create a P2P payment request asking another agent to send USDC. Requires
  // an existing connection with the recipient. Requests expire after 7 days.
  // Sends a real-time notification to the recipient.
  rpc CreateWalletRequest(CreateWalletRequestRequest) returns (WalletRequest) {
    option (kuren.authz.authz) = {
      scopes: ["payments:send"]
    };
    option (google.api.http) = {
      post: "/v1/payments/requests"
      body: "*"
    };
  }

  // List pending payment requests where the caller is the recipient (i.e.,
  // requests the caller can approve or deny). Excludes expired requests.
  rpc GetPendingWalletRequests(GetPendingWalletRequestsRequest) returns (WalletRequestsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/payments/requests/pending"};
  }

  // List payment requests the caller has sent to other agents (all statuses).
  rpc GetSentWalletRequests(GetSentWalletRequestsRequest) returns (WalletRequestsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/payments/requests/sent"};
  }

  // Approve a pending payment request, transferring the requested USDC from
  // the caller's wallet to the requester's wallet on the same provider.
  // Requires "spend" wallet permission. Fails if the request is not pending,
  // has expired, or the caller is not the request's recipient. Notifies the
  // requester on approval.
  rpc ApproveWalletRequest(ApproveWalletRequestRequest) returns (ApproveWalletRequestResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:send"]
    };
    option (google.api.http) = {
      post: "/v1/payments/requests/{request_id}/approve"
      body: "*"
    };
  }

  // Deny a pending payment request. Only the request's recipient can deny it.
  // Notifies the requester on denial.
  rpc DenyWalletRequest(DenyWalletRequestRequest) returns (WalletRequest) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {
      post: "/v1/payments/requests/{request_id}/deny"
      body: "*"
    };
  }

  // Return the raw Solana public key and network for a CDP wallet so the
  // caller can fund it externally. CDP-only; also requires the "onramp"
  // wallet-level permission. The OAuth scope acts as a regulatory kill switch.
  rpc OnRamp(OnRampRequest) returns (OnRampResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:onramp"]
    };
    option (google.api.http) = {get: "/v1/payments/onramp"};
  }

  // Transfer USDC from a CDP wallet to an external Solana address. CDP-only;
  // also requires the "offramp" wallet-level permission. Rejects destinations
  // that belong to a wallet on this platform (use SendPayment instead). Creates
  // an audit-trail withdrawal record before executing the on-chain transfer.
  rpc OffRamp(OffRampRequest) returns (OffRampResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:offramp"]
    };
    option (google.api.http) = {
      post: "/v1/payments/offramp"
      body: "*"
    };
  }

  // Submit a settlement confirmation for a Kuren IOU transaction. Only the
  // original sender can submit. The transaction must be on the "kuren" provider
  // and in "unsettled" state.
  rpc SubmitConfirmation(SubmitConfirmationRequest) returns (ConfirmationResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:send"]
    };
    option (google.api.http) = {
      post: "/v1/payments/confirmations"
      body: "*"
    };
  }

  // Confirm or reject a pending settlement confirmation. Only members of the
  // transaction's receiving wallet can respond. If confirmed, the underlying
  // transaction's settlement_status is atomically updated to "settled".
  rpc RespondToConfirmation(RespondToConfirmationRequest) returns (ConfirmationResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:send"]
    };
    option (google.api.http) = {
      post: "/v1/payments/confirmations/{confirmation_id}/respond"
      body: "*"
    };
  }

  // List pending settlement confirmations where the caller is a member of the
  // receiving wallet and has not yet responded.
  rpc GetPendingConfirmations(GetPendingConfirmationsRequest) returns (ConfirmationsResponse) {
    option (kuren.authz.authz) = {
      scopes: ["payments:balance"]
    };
    option (google.api.http) = {get: "/v1/payments/confirmations/pending"};
  }
}

message GetBalanceRequest {
  string channel = 1; // Deprecated: use wallet_id instead
  string wallet_id = 2; // Optional: specific wallet (default wallet if empty)
}

message BalanceResponse {
  int64 usdc_amount = 1; // Micro-units (6 decimals), e.g., 1000000 = 1 USDC
  // Solana ATA deposit address. Only populated for CDP wallets when the caller
  // also holds the payments:onramp scope.
  string solana_address = 2;
  string provider = 3; // "cdp" or "kuren"
  string wallet_id = 4;
}

message SendPaymentRequest {
  string to_handle = 1; // Recipient handle (e.g., "rychmc" without @)
  int64 usdc_amount = 2; // Micro-units (6 decimals); must be positive
  string memo = 3;
  string channel = 4; // Deprecated: use wallet_id instead
  string wallet_id = 5; // Optional: specific wallet (default wallet if empty)
}

message SendPaymentResponse {
  string transaction_id = 1;
  // CDP transfers start "pending" and are confirmed on-chain later.
  // Kuren transfers are immediately "confirmed".
  string status = 2; // "pending" | "confirmed" | "failed"
  int64 new_balance = 3; // Sender's new balance after transfer. Micro-units (6 decimals).
  string provider = 4; // "cdp" or "kuren"
  string settlement_status = 5; // "unsettled" for kuren, empty for cdp
}

message GetTransactionsRequest {
  int32 limit = 1; // Max transactions to return (default 20, max 100)
  string cursor = 2; // Pagination cursor (transaction ID from next_cursor)
  string channel = 3; // Deprecated: use wallet_id instead
  string wallet_id = 4; // Optional: specific wallet (all wallets if empty)
}

message GetTransactionsResponse {
  repeated Transaction transactions = 1;
  string next_cursor = 2; // Empty when no more pages remain
}

message Transaction {
  string id = 1;
  string from_handle = 2; // Empty for deposits
  string to_handle = 3;
  int64 usdc_amount = 4; // Micro-units (6 decimals)
  string memo = 5;
  string status = 6; // "pending" | "confirmed" | "failed"
  string created_at = 7; // RFC3339
  string confirmed_at = 8; // RFC3339, empty if not yet confirmed
  // On-chain Solana signature. Only populated for CDP transactions and only
  // when the caller holds the payments:onramp scope.
  string solana_tx_sig = 9;
  string provider = 10; // "cdp" or "kuren"
  string settlement_status = 11; // "unsettled" | "settled" | empty (CDP)
  string from_wallet_id = 12;
  string to_wallet_id = 13;
}

message GetDepositAddressRequest {
  string channel = 1; // Deprecated: use wallet_id instead
  string wallet_id = 2; // Optional: specific CDP wallet
}

message DepositAddressResponse {
  string solana_address = 1; // Solana ATA for USDC deposits
}

// --- P2P Wallet Requests ---
//
// Flow: Agent A calls CreateWalletRequest targeting Agent B. Agent B sees the
// request via GetPendingWalletRequests and either approves (triggering a
// transfer) or denies it. Requests auto-expire after 7 days.

message WalletRequest {
  string id = 1;
  string requester_handle = 2; // Agent who is asking for money
  string recipient_handle = 3; // Agent who is being asked to pay
  int64 usdc_amount = 4; // Micro-units (6 decimals)
  string memo = 5;
  string status = 6; // "pending" | "approved" | "denied" | "expired"
  google.protobuf.Timestamp expires_at = 7;
  google.protobuf.Timestamp created_at = 8;
  string provider = 9; // "cdp" or "kuren"
}

message CreateWalletRequestRequest {
  string to_handle = 1; // Handle of the agent to request money from
  int64 usdc_amount = 2; // Micro-units (6 decimals); must be positive
  string memo = 3;
  string channel = 4; // Deprecated: use wallet_id instead
  // Determines the provider for the request. The recipient must also have a
  // wallet on the same provider.
  string wallet_id = 5;
}

message GetPendingWalletRequestsRequest {
  int32 limit = 1; // Max requests to return (default 20, max 100)
  string channel = 2; // Deprecated: use wallet_id instead
}

message GetSentWalletRequestsRequest {
  int32 limit = 1; // Max requests to return (default 20, max 100)
  string channel = 2; // Deprecated: use wallet_id instead
}

message WalletRequestsResponse {
  repeated WalletRequest requests = 1;
}

message ApproveWalletRequestRequest {
  string request_id = 1;
  string channel = 2; // Deprecated
}

message ApproveWalletRequestResponse {
  WalletRequest request = 1;
  string transaction_id = 2; // The transfer created by the approval
  int64 new_balance = 3; // Approver's new balance after payment. Micro-units (6 decimals).
}

message DenyWalletRequestRequest {
  string request_id = 1;
  string channel = 2; // Deprecated
}

// --- Settlement Confirmations ---
//
// Kuren IOU transactions are recorded as "unsettled" because no real money
// moves on-chain. The sender can submit a confirmation (e.g., "paid via
// Venmo"), and the receiver can confirm or reject it. When confirmed, the
// transaction's settlement_status transitions from "unsettled" to "settled".

message SubmitConfirmationRequest {
  string transaction_id = 1; // Must reference a Kuren IOU transaction in "unsettled" state
  string memo = 2; // How settlement was done (e.g., "paid via Venmo")
}

message RespondToConfirmationRequest {
  string confirmation_id = 1;
  bool confirm = 2; // true = mark settled, false = reject the claim
}

message ConfirmationResponse {
  string id = 1;
  string transaction_id = 2;
  string requested_by_handle = 3; // The sender who claims they settled
  string memo = 4;
  string status = 5; // "pending" | "confirmed" | "rejected"
  string responded_by_handle = 6; // Empty if still pending
  string responded_at = 7; // RFC3339, empty if pending
  string created_at = 8; // RFC3339
}

message GetPendingConfirmationsRequest {
  int32 limit = 1; // Max confirmations to return (default 20, max 100)
}

message ConfirmationsResponse {
  repeated ConfirmationResponse confirmations = 1;
}

// --- On-ramp / Off-ramp ---
//
// These endpoints bridge CDP (Coinbase Developer Platform) wallets with the
// external Solana network. Kuren IOU wallets do not support on-ramp or
// off-ramp. Both OAuth scopes (payments:onramp / payments:offramp) and
// wallet-level permissions ("onramp" / "offramp") must be present, providing
// a regulatory kill switch at the OAuth layer.

message OnRampRequest {
  string wallet_id = 1; // Optional: specific CDP wallet (default wallet if empty)
}

message OnRampResponse {
  string solana_pubkey = 1; // Raw Solana public key (not the ATA)
  string wallet_id = 2;
  string network = 3; // "devnet" or "mainnet"
}

message OffRampRequest {
  string wallet_id = 1; // Optional: specific CDP wallet (default wallet if empty)
  // Must be a truly external Solana address; platform-internal addresses are
  // rejected (use SendPayment for internal transfers).
  string destination_address = 2;
  int64 usdc_amount = 3; // Micro-units (6 decimals); must be positive
  string memo = 4;
}

message OffRampResponse {
  string withdrawal_id = 1; // Audit-trail record ID
  string solana_tx_sig = 2; // On-chain transaction signature
  string status = 3; // "pending" | "confirmed" | "failed"
  int64 new_balance = 4; // Balance after withdrawal. Micro-units (6 decimals).
}
